<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard | Cadastro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <!-- Particle Background -->
  <script src="background-particles.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <div class="container-wrapper">
    <div class="main-glass-wrapper">
      <div class="parent grid-cadastro">

        <div class="card sidebar-card div1">
          <div class="sidebar-content">
            <h3 class="menu-title">Menu Principal</h3>
            <nav class="sidebar-nav">
              <a href="index.html" class="nav-item"><i data-lucide="layout-dashboard"
                  class="lucide-3d"></i><span>Financeiro</span></a>
              <a href="Clientes.html" class="nav-item"><i data-lucide="users"
                  class="lucide-3d"></i><span>Clientes</span></a>
              <a href="Funcionarios.html" class="nav-item"><i data-lucide="user-cog"
                  class="lucide-3d"></i><span>Funcionários</span></a>
              <a href="Cadastro.html" class="nav-item active"><i data-lucide="file-plus-2"
                  class="lucide-3d"></i><span>Cadastro</span></a>
              <a href="dados.html" class="nav-item"><i data-lucide="database"
                  class="lucide-3d"></i><span>Dados</span></a>
            </nav>
            <a href="#" onclick="logout();return false" class="nav-item nav-logout">
              <i data-lucide="log-out" class="lucide-3d"></i><span>Sair</span>
            </a>
            <div class="sidebar-fruits">
              <i data-lucide="apple" class="lucide-3d" style="opacity:0.4"></i>
              <i data-lucide="leaf" class="lucide-3d" style="opacity:0.4"></i>
              <i data-lucide="citrus" class="lucide-3d" style="opacity:0.4"></i>
            </div>
          </div>
        </div>

        <div class="card header-card tilt div2">
          <div class="header-left">
            <h1><span class="header-highlight">Dashboard</span><span class="header-pipe">|</span>Controle Financeiro
            </h1>
          </div>
          <div class="header-right">
            <div class="logo-container">
              <img src="ativa.webp" alt="Ativa Distribuidora" class="logo-img">
            </div>
          </div>
        </div>

        <div class="card form-card div3">
          <div class="form-title"><i data-lucide="file-plus-2" class="lucide-3d"
              style="color:var(--accent);margin-right:10px"></i> Novo Cadastro</div>
          <form id="cadastroForm" class="form-grid" autocomplete="off">
            <div class="form-group"><label for="campo-data">Data</label><input type="date" id="campo-data" required>
            </div>
            <div class="form-group"><label for="campo-categoria">Categoria</label>
              <select id="campo-categoria" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Clientes">Clientes</option>
                <option value="Funcionários">Funcionários</option>
                <option value="Outros">Outros</option>
              </select>
            </div>
            <div class="form-group"><label for="campo-tipo">Tipo</label>
              <select id="campo-tipo" required>
                <option value="" disabled selected>Selecione a categoria primeiro</option>
              </select>
            </div>
            <div class="form-group" id="nome-group"><label for="campo-nome">Nome</label><input type="text"
                id="campo-nome" placeholder="Digite o nome..." required></div>
            <div class="form-group" id="group-classe" style="display:none;"><label for="campo-classe">Classe</label>
              <select id="campo-classe">
                <option value="" disabled selected>Selecione...</option>
                <option value="Transporte">Transporte</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Infraestrutura">Infraestrutura</option>
                <option value="Outras Despesas">Outras Despesas</option>
              </select>
            </div>
            <div class="form-group" id="group-grupo" style="display:none;"><label for="campo-grupo">Grupo</label>
              <select id="campo-grupo">
                <option value="" disabled selected>Selecione a classe primeiro</option>
              </select>
            </div>
            <div class="form-group full-width"><label for="campo-descricao">Descrição <span
                  style="color:var(--tx-muted);font-weight:400">(opcional)</span></label><textarea id="campo-descricao"
                placeholder="Descrição do lançamento..." rows="2"></textarea></div>
            <div class="form-group"><label for="campo-valor">Valor (R$)</label><input type="number" id="campo-valor"
                step="0.01" min="0" placeholder="0,00" required></div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" id="btn-limpar">Limpar</button>
              <button type="submit" class="btn-primary">Cadastrar</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    const catSel = document.getElementById('campo-categoria'), tipoSel = document.getElementById('campo-tipo'), form = document.getElementById('cadastroForm');
    const classeSel = document.getElementById('campo-classe'), groupClasse = document.getElementById('group-classe'), groupGrupo = document.getElementById('group-grupo');
    const funcs = ['Paulo', 'Hamilton', 'Joice', 'Peninha', 'Ecione'];
    document.getElementById('campo-data').valueAsDate = new Date();

    function checkOutros() {
      if (catSel.value === 'Outros' && tipoSel.value === 'Despesa') {
        groupClasse.style.display = 'flex'; groupGrupo.style.display = 'flex';
        classeSel.required = true; const i = document.getElementById('campo-grupo'); if (i) i.required = true;
      } else {
        groupClasse.style.display = 'none'; groupGrupo.style.display = 'none';
        classeSel.required = false; const i = document.getElementById('campo-grupo'); if (i) i.required = false;
        classeSel.value = ''; resetGrupo();
      }
    }

    catSel.addEventListener('change', () => {
      const c = catSel.value;
      tipoSel.innerHTML = '<option value="" disabled selected>Selecione...</option><option value="Faturamento">Faturamento</option><option value="Despesa">Despesa</option>';
      if (c === 'Funcionários') { const s = document.createElement('select'); s.id = 'campo-nome'; s.required = true; s.innerHTML = '<option value="" disabled selected>Selecione...</option>' + funcs.map(f => `<option value="${f}">${f}</option>`).join(''); document.getElementById('campo-nome').replaceWith(s) }
      else { resetNome() }
      checkOutros();
    });
    tipoSel.addEventListener('change', checkOutros);

    function resetGrupo() {
      const g = document.getElementById('campo-grupo');
      const s = document.createElement('select'); s.id = 'campo-grupo'; s.innerHTML = '<option value="" disabled selected>Selecione a classe primeiro</option>';
      g.replaceWith(s);
    }

    classeSel.addEventListener('change', () => {
      const c = classeSel.value, g = document.getElementById('campo-grupo');
      let h = '<option value="" disabled selected>Selecione...</option>';
      if (c === 'Transporte') {
        h += '<option value="Combustível">Combustível</option><option value="Frete">Frete</option><option value="IPVA">IPVA</option><option value="Seguro">Seguro</option><option value="Multa">Multa</option><option value="Mecânica">Mecânica</option><option value="Prestações">Prestações</option><option value="Diária">Diária</option><option value="Outros">Outros</option>';
        const s = document.createElement('select'); s.id = 'campo-grupo'; s.required = true; s.innerHTML = h; g.replaceWith(s);
      } else if (c === 'Alimentação') {
        h += '<option value="Almoço">Almoço</option><option value="Café da Manhã">Café da Manhã</option><option value="Diversos">Diversos</option>';
        const s = document.createElement('select'); s.id = 'campo-grupo'; s.required = true; s.innerHTML = h; g.replaceWith(s);
      } else if (c === 'Infraestrutura') {
        h += '<option value="Aluguel">Aluguel</option><option value="Internet">Internet</option><option value="Embalagens">Embalagens</option><option value="Impostos">Impostos</option><option value="Prestações">Prestações</option><option value="Outros">Outros</option>';
        const s = document.createElement('select'); s.id = 'campo-grupo'; s.required = true; s.innerHTML = h; g.replaceWith(s);
      } else if (c === 'Outras Despesas') {
        const i = document.createElement('input'); i.type = 'text'; i.id = 'campo-grupo'; i.required = true; i.placeholder = 'Qual despesa?'; g.replaceWith(i);
      }
    });

    function resetNome() { const c = document.getElementById('campo-nome'); if (c.tagName === 'SELECT') { const i = document.createElement('input'); i.type = 'text'; i.id = 'campo-nome'; i.placeholder = 'Digite o nome...'; i.required = true; c.replaceWith(i) } }
    form.addEventListener('submit', e => {
      e.preventDefault();
      const entry = { data: document.getElementById('campo-data').value, categoria: catSel.value, tipo: tipoSel.value, nome: document.getElementById('campo-nome').value, descricao: document.getElementById('campo-descricao').value, valor: parseFloat(document.getElementById('campo-valor').value) };
      if (groupClasse.style.display !== 'none') {
        entry.classe = classeSel.value;
        entry.grupo = document.getElementById('campo-grupo').value;
      }
      if (!entry.data || !entry.categoria || !entry.tipo || !entry.nome || isNaN(entry.valor)) { showToast('Preencha todos os campos!', 'warning'); return }
      addEntry(entry); showToast('Cadastrado com sucesso!'); form.reset(); document.getElementById('campo-data').valueAsDate = new Date();
      tipoSel.innerHTML = '<option value="" disabled selected>Selecione a categoria primeiro</option>'; resetNome(); resetGrupo(); checkOutros();
    });
    document.getElementById('btn-limpar').addEventListener('click', () => { form.reset(); document.getElementById('campo-data').valueAsDate = new Date(); tipoSel.innerHTML = '<option value="" disabled selected>Selecione a categoria primeiro</option>'; resetNome(); resetGrupo(); checkOutros(); });
  </script>
</body>

</html>
