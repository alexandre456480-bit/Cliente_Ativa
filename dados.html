<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard | Dados</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<video class="bg-video" autoplay muted loop playsinline><source src="0318.mp4" type="video/mp4"></video>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
<div class="cursor-glow"></div>
<span class="fruit-deco" style="top:18%;left:4%">🍊</span><span class="fruit-deco" style="bottom:10%;right:5%">🥬</span>

<div class="container-wrapper"><div class="parent grid-dados">

<div class="card sidebar-card div1"><div class="sidebar-content">
<h3 class="menu-title">Menu Principal</h3>
<nav class="sidebar-nav">
<a href="index.html" class="nav-item"><i class="fa-solid fa-chart-line"></i><span>Financeiro</span></a>
<a href="Clientes.html" class="nav-item"><i class="fa-solid fa-users"></i><span>Clientes</span></a>
<a href="Funcionarios.html" class="nav-item"><i class="fa-solid fa-user-tie"></i><span>Funcionários</span></a>
<a href="Cadastro.html" class="nav-item"><i class="fa-solid fa-file-circle-plus"></i><span>Cadastro</span></a>
<a href="dados.html" class="nav-item"><i class="fa-solid fa-database"></i><span>Dados</span></a>
</nav><div class="sidebar-fruits">🍎 🥦 🍊 🥕 🍋</div>
</div></div>

<div class="card header-card tilt div2">
<div class="header-left"><h1><span class="header-highlight">Dashboard</span><span class="header-pipe">|</span>Controle Financeiro</h1></div>
<div class="header-right"><span class="company-name">Ativa Distribuidora<span class="nome-glow"></span></span></div>
</div>

<div class="card dados-card div3">
<div class="dados-header">
<h2><i class="fa-solid fa-database"></i> Dados Cadastrados</h2>
<div class="dados-actions">
<button class="btn-icon" id="btn-import-csv"><i class="fa-solid fa-file-import"></i> Importar CSV</button>
<button class="btn-icon" id="btn-export-csv"><i class="fa-solid fa-file-export"></i> Exportar CSV</button>
<input type="file" id="file-input-csv" class="file-input-hidden" accept=".csv,.txt">
</div></div>
<div class="tabs-container">
<button class="tab-btn active" data-tab="clientes"><i class="fa-solid fa-users"></i> Clientes</button>
<button class="tab-btn" data-tab="funcionarios"><i class="fa-solid fa-user-tie"></i> Funcionários</button>
<button class="tab-btn" data-tab="outros"><i class="fa-solid fa-ellipsis"></i> Outros</button>
</div>
<div class="tab-panel active" id="panel-clientes"><div class="data-table-wrapper"><table class="data-table" id="table-clientes"><thead><tr><th>Data</th><th>Tipo</th><th>Nome</th><th>Descrição</th><th>Valor</th><th>Ação</th></tr></thead><tbody></tbody></table></div></div>
<div class="tab-panel" id="panel-funcionarios"><div class="data-table-wrapper"><table class="data-table" id="table-funcionarios"><thead><tr><th>Data</th><th>Tipo</th><th>Nome</th><th>Descrição</th><th>Valor</th><th>Ação</th></tr></thead><tbody></tbody></table></div></div>
<div class="tab-panel" id="panel-outros"><div class="data-table-wrapper"><table class="data-table" id="table-outros"><thead><tr><th>Data</th><th>Tipo</th><th>Nome</th><th>Descrição</th><th>Valor</th><th>Ação</th></tr></thead><tbody></tbody></table></div></div>
</div>

</div></div>
<script src="data.js"></script><script src="script.js"></script>
<script>
function renderTables(){renderTable('Clientes','table-clientes');renderTable('Funcionários','table-funcionarios');renderTable('Outros','table-outros')}
function renderTable(cat,tid){
  const tbody=document.querySelector('#'+tid+' tbody'),data=getByCategory(cat);
  if(!data.length){tbody.innerHTML='<tr><td colspan="6" class="empty-table"><i class="fa-regular fa-folder-open"></i> Nenhum dado para "'+cat+'"</td></tr>';return}
  tbody.innerHTML=data.map(d=>'<tr><td>'+formatDateFull(d.data)+'</td><td><span class="tag-'+d.tipo.toLowerCase()+'">'+d.tipo+'</span></td><td>'+d.nome+'</td><td>'+(d.descricao||'—')+'</td><td>'+formatCurrency(d.valor)+'</td><td><button class="btn-remove" data-id="'+d.id+'"><i class="fa-solid fa-trash-can"></i></button></td></tr>').join('');
  tbody.querySelectorAll('.btn-remove').forEach(b=>b.addEventListener('click',()=>{removeEntry(b.dataset.id);showToast('Removido!');renderTables()}));
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  b.classList.add('active');document.getElementById('panel-'+b.dataset.tab).classList.add('active');
}));
document.getElementById('btn-import-csv').addEventListener('click',()=>document.getElementById('file-input-csv').click());
document.getElementById('file-input-csv').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const c=await importCSV(f);showToast(c+' importados!');renderTables()}catch(err){showToast(err,'error')}e.target.value=''});
document.getElementById('btn-export-csv').addEventListener('click',()=>exportCSV(null));
document.addEventListener('DOMContentLoaded',renderTables);
window.addEventListener('storage',e=>{if(e.key===DATA_KEY)renderTables()});
</script>
</body></html>
